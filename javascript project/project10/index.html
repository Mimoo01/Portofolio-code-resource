<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>typing speed test</title>
  </head>
  <link rel="stylesheet" href="style.css" />

  <body>
    <div class="container">
      <h1>Typing speed test</h1>
      <p id="text-to-type">The quick brown fox jumps over the lazy dog</p>
      <textarea placeholder="Start typing here..." id="user-input"> </textarea>
      <button id="start-button">Start test here</button>
      <div id="result">
        <p id="timer">Time: <span id="time">0</span> seconds</p>
        <p id="wpm">Words per minute: <span id="words-per-minute">0</span> WPM</p>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
