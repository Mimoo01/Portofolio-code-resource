<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Audio Player with Playlist</title>
  </head>
  <link rel="stylesheet" href="style.css" />
  <body>
    <div class="container">
      <div class="audio-player">
        <div class="audio-controls">
          <button>
            <button id="play-pause-btn" class="play-button">
              <!-- svg untuk play icon -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
                <path fill="currentColor" d="M8 5v14l11-7z" />
              </svg>
              <!-- svg pause icon -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" style="display: none">
                <path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
              </svg>
            </button>
          </button>
          <div class="progress-container">
            <div id="progress-bar"></div>
          </div>
        </div>
        <p id="current-track">No Track Selected</p>
        <audio src="" id="audio"></audio>
      </div>
      <div class="audio-list">
        <label for="audio-upload" class="upload-label"> import audio </label>
        <input type="file" name="audio" id="audio-upload" accept="audio/*" multiple />
        <ul id="playlist">
          <!-- List audio akan diisi oleh array javascriptnya -->
        </ul>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
