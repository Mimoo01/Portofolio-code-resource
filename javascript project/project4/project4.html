<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Carousel</title>
  </head>
  <link rel="stylesheet" href="project4.css" />

  <body>
    <div class="container">
      <header>
        <h1>Welcome to project image carousel</h1>
        <h2>Follow for more projects</h2>
      </header>
      <div class="carousel-container">
        <div class="carousel-slide">
          <img src="https://i.pinimg.com/originals/8c/31/ca/8c31ca81117a732a52a7b1e24294b37d.jpg" alt="" />
          <img src="https://c8.alamy.com/comp/MMH44B/beautiful-modern-house-with-garden-outdoor-MMH44B.jpg" alt="" />
          <img src="https://thumbs.dreamstime.com/b/modern-house-exterior-landscaped-garden-sunset-modern-house-exterior-landscaped-garden-sunset-ai-generated-355555988.jpg" alt="" />
        </div>

        <button class="prev-btn">Previous</button>
        <button class="next-btn">Next</button>

        <div class="carousel-indicators">
          <span class="indicator active"></span>
          <span class="indicator"></span>
          <span class="indicator"></span>
        </div>
      </div>
    </div>
  </body>
  <script src="project4.js"></script>
</html>
